<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FundiLink</title>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18",
      "react-dom/client": "https://esm.sh/react-dom@18/client"
    }
  }
  </script>
</head>

<body>
  <div id="root"></div>

  <script type="module">
    import React from "react";
    import ReactDOM from "react-dom/client";

    const route = window.location.hash;

    function Page() {
      if (route === "#/admin") {
        return React.createElement("h1", null, "Admin Dashboard");
      }

      if (route === "#/fundi") {
        return React.createElement("h1", null, "Fundi Dashboard");
      }

      if (route === "#/client") {
        return React.createElement("h1", null, "Client Dashboard");
      }

      return React.createElement(
        "div",
        null,
        React.createElement("h1", null, "FundiLink Home"),
        React.createElement("p", null, "Use routes:"),
        React.createElement("p", null, "/#/admin"),
        React.createElement("p", null, "/#/fundi"),
        React.createElement("p", null, "/#/client")
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      React.createElement(Page)
    );
  </script>
</body>
</html>
