<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FundiLink</title>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18",
      "react-dom/client": "https://esm.sh/react-dom@18/client"
    }
  }
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .page {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5e1;
      font-size: 18px;
    }

    .home-links a {
      display: block;
      margin: 10px;
      color: #38bdf8;
      text-decoration: none;
      font-size: 20px;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="module">
    import React from "react";
    import ReactDOM from "react-dom/client";

    const route = window.location.hash;

    function Dashboard(title) {
      return React.createElement(
        "div",
        { className: "page" },
        React.createElement("h1", null, title),
        React.createElement("p", null, "FundiLink System")
      );
    }

    function Home() {
      return React.createElement(
        "div",
        { className: "page home-links" },
        React.createElement("h1", null, "FundiLink"),
        React.createElement("a", { href: "/#/admin" }, "Admin Dashboard"),
        React.createElement("a", { href: "/#/fundi" }, "Fundi Dashboard"),
        React.createElement("a", { href: "/#/client" }, "Client Dashboard")
      );
    }

    function App() {
      if (route === "#/admin") {
        return Dashboard("Admin Dashboard");
      }

      if (route === "#/fundi") {
        return Dashboard("Fundi Dashboard");
      }

      if (route === "#/client") {
        return Dashboard("Client Dashboard");
      }

      return Home();
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      React.createElement(App)
    );
  </script>
</body>
</html>
