
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FundiLink Kenya</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
padding:0;
}
header{
background:#0b5ed7;
color:white;
padding:20px;
text-align:center;
}
.container{
padding:20px;
max-width:1000px;
margin:auto;
}
.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
input,button{
padding:12px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}
button{
background:#0b5ed7;
color:white;
cursor:pointer;
border:none;
}
.job,.fundi{
border:1px solid #ddd;
padding:15px;
margin-top:10px;
border-radius:10px;
}
</style>
</head>
<body>

<header>
<h1>FundiLink Kenya</h1>
<p>Find Trusted Fundis & Jobs</p>
</header>

<div class="container">

<div class="card">
<h2>Register Fundi</h2>
<input id="fname" placeholder="Fundi Name">
<input id="fskill" placeholder="Skill">
<input id="flocation" placeholder="Location">
<button onclick="addFundi()">Register</button>

<div id="fundis"></div>
</div>

<div class="card">
<h2>Post Job</h2>
<input id="jtitle" placeholder="Job Title">
<input id="jlocation" placeholder="Location">
<input id="jbudget" placeholder="Budget">
<button onclick="addJob()">Post Job</button>

<div id="jobs"></div>
</div>

</div>

<script>
let fundis = [
{name:"John Electrician",skill:"Electrical",location:"Nairobi"}
];

let jobs = [
{title:"Need CCTV Installation",location:"Westlands",budget:"KSh 15,000"}
];

function renderFundis(){
let container = document.getElementById("fundis");
container.innerHTML = "";
fundis.forEach(f=>{
container.innerHTML += `
<div class="fundi">
<h3>${f.name}</h3>
<p><b>Skill:</b> ${f.skill}</p>
<p><b>Location:</b> ${f.location}</p>
</div>
`;
});
}

function renderJobs(){
let container = document.getElementById("jobs");
container.innerHTML = "";
jobs.forEach(j=>{
container.innerHTML += `
<div class="job">
<h3>${j.title}</h3>
<p><b>Location:</b> ${j.location}</p>
<p><b>Budget:</b> ${j.budget}</p>
</div>
`;
});
}

function addFundi(){
const name = document.getElementById("fname").value;
const skill = document.getElementById("fskill").value;
const location = document.getElementById("flocation").value;

if(!name) return;

fundis.push({name,skill,location});
renderFundis();

document.getElementById("fname").value="";
document.getElementById("fskill").value="";
document.getElementById("flocation").value="";
}

function addJob(){
const title = document.getElementById("jtitle").value;
const location = document.getElementById("jlocation").value;
const budget = document.getElementById("jbudget").value;

if(!title) return;

jobs.push({title,location,budget});
renderJobs();

document.getElementById("jtitle").value="";
document.getElementById("jlocation").value="";
document.getElementById("jbudget").value="";
}

renderFundis();
renderJobs();
</script>

</body>
</html>
