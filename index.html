<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FundiLink</title>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18",
      "react-dom/client": "https://esm.sh/react-dom@18/client"
    }
  }
  </script>
</head>

<body>
  <div id="root"></div>

  <script type="module">
    import React from "react";
    import ReactDOM from "react-dom/client";

    const path = window.location.pathname;

    function Page() {
      if (path === "/admin") {
        return React.createElement("h1", null, "Admin Dashboard");
      }

      if (path === "/fundi") {
        return React.createElement("h1", null, "Fundi Dashboard");
      }

      if (path === "/client") {
        return React.createElement("h1", null, "Client Dashboard");
      }

      return React.createElement("h1", null, "FundiLink Home");
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      React.createElement(Page)
    );
  </script>
</body>
</html>
